<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>99 飛機生存戰</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hud" aria-label="遊戲狀態">
        <div>
          <p class="eyebrow">Bullet Survival</p>
          <h1>99 飛機生存戰</h1>
        </div>
        <div class="stats">
          <div>
            <span>生存</span>
            <strong id="survivalTime">0.0s</strong>
          </div>
          <div>
            <span>最佳</span>
            <strong id="bestTime">0.0s</strong>
          </div>
          <div>
            <span>難度</span>
            <strong id="level">1</strong>
          </div>
        </div>
      </section>

      <section class="game-wrap">
        <canvas id="game" width="960" height="600" aria-label="飛機閃避子彈遊戲"></canvas>
        <div id="overlay" class="overlay">
          <div class="overlay-card">
            <h2 id="overlayTitle">準備起飛</h2>
            <p id="overlayText">電腦用方向鍵或 WASD。手機按住飛機拖曳，就能移動它。</p>

            <form id="scoreForm" class="score-form" hidden>
              <label>
                暱稱
                <input id="nickname" name="nickname" maxlength="16" placeholder="輸入你的暱稱" />
              </label>
              <label>
                照片
                <input id="avatarInput" name="avatar" type="file" accept="image/*" />
              </label>
              <div class="form-actions">
                <button id="saveScoreBtn" type="submit">儲存成績</button>
                <button id="skipScoreBtn" class="secondary" type="button">略過</button>
              </div>
            </form>

            <section id="leaderboard" class="leaderboard" aria-labelledby="leaderboardTitle" hidden>
              <div class="board-title">
                <h2 id="leaderboardTitle">本機排行榜</h2>
                <button id="clearBoard" class="ghost" type="button">清除</button>
              </div>
              <ol id="scores"></ol>
            </section>

            <button id="startBtn" type="button">開始遊戲</button>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
