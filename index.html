<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>99 飛機生存戰</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hud" aria-label="遊戲狀態">
        <div>
          <p class="eyebrow">Bullet Survival</p>
          <h1>99 飛機生存戰</h1>
        </div>
        <div class="stats">
          <div>
            <span>生存</span>
            <strong id="survivalTime">0.0s</strong>
          </div>
          <div>
            <span>最佳</span>
            <strong id="bestTime">0.0s</strong>
          </div>
          <div>
            <span>難度</span>
            <strong id="level">1</strong>
          </div>
        </div>
      </section>

      <section class="game-wrap">
        <canvas id="game" width="960" height="600" aria-label="飛機閃避子彈遊戲"></canvas>
        <div id="overlay" class="overlay">
          <div class="overlay-card">
            <h2 id="overlayTitle">準備起飛</h2>
            <p id="overlayText">用方向鍵或 WASD 移動，閃開從四面八方射來的子彈。</p>
            <button id="startBtn" type="button">開始遊戲</button>
          </div>
        </div>
      </section>

      <section class="leaderboard" aria-labelledby="leaderboardTitle">
        <div class="board-title">
          <h2 id="leaderboardTitle">本機排行榜</h2>
          <button id="clearBoard" class="ghost" type="button">清除</button>
        </div>
        <ol id="scores"></ol>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
